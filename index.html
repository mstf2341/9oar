<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTF Quiz - Firebase System</title>
    <style>
        :root { --p: #007bff; --s: #28a745; --d: #dc3545; --w: #ffc107; --dk: #343a40; --lt: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #dee2e6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .screen { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 95%; max-width: 600px; display: none; }
        .active { display: block; }
        .btn { padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-p { background: var(--p); color: white; }
        .btn-dk { background: var(--dk); color: white; }
        .score-box { display: flex; justify-content: space-around; background: var(--lt); padding: 15px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #ddd; }
        .points { font-size: 2.8rem; font-weight: bold; color: var(--p); }
        .img-box { width: 100%; border-radius: 15px; background: #eee; margin: 15px 0; overflow: hidden; border: 3px solid #ddd; min-height: 250px; }
        img { width: 100%; display: block; height: auto; }
        .ans-label { font-size: 2.2rem; color: var(--s); font-weight: bold; margin-top: 10px; background: #e9f7ef; padding: 10px; border-radius: 10px; display: none; }
        .admin-controls { background: #fff3cd; padding: 15px; border-radius: 10px; border: 1px dashed #856404; }
        .team-label { font-size: 1.2rem; font-weight: bold; color: var(--dk); margin-bottom: 5px; }
        .name-input { width: 80%; padding: 8px; border-radius: 8px; border: 1px solid #ccc; text-align: center; margin-bottom: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="s-home" class="screen active">
        <h1 style="color:var(--p); margin-bottom:5px;">MSTF QUIZ</h1>
        <p style="margin-top:0;">نظام التحكم المتطور</p>
        <button class="btn btn-p" onclick="initApp('display')">فتح شاشة العرض (الجمهور)</button>
        <button class="btn btn-dk" onclick="initApp('admin')">فتح لوحة التحكم (المقدم)</button>
    </div>

    <div id="s-display" class="screen">
        <div id="d-num" style="font-weight: bold; margin-bottom: 10px;">بانتظار البداية...</div>
        <div class="score-box">
            <div><div id="d-t1n" class="team-label">فريق 1</div><div id="d-p1" class="points">0</div></div>
            <div><div id="d-t2n" class="team-label">فريق 2</div><div id="d-p2" class="points">0</div></div>
        </div>
        <div class="img-box"><img id="d-img" src=""></div>
        <div id="d-ans" class="ans-label"></div>
    </div>

    <div id="s-admin" class="screen">
        <div class="admin-controls">
            <div id="a-hint" style="font-weight:bold; color:#856404; font-size: 1.3rem; margin-bottom:10px;">الإجابة: ---</div>
            <button class="btn btn-p" style="background:var(--w); color:black;" id="btnReveal">إظهار الإجابة للجمهور</button>
            <button class="btn btn-p" id="btnNext">اللغز التالي ➔</button>
        </div>
        
        <div class="score-box" style="margin-top:20px; flex-direction: column;">
            <div style="display: flex; justify-content: space-around; width: 100%;">
                <div style="width: 45%;">
                    <input type="text" id="t1Name" class="name-input" placeholder="اسم الفريق 1" value="فريق 1">
                    <br>
                    <button class="btn" style="width:50px; font-size: 1.5rem;" id="p1Plus">+</button> 
                    <button class="btn" style="width:50px; background:var(--d); color:white;" id="p1Minus">-</button>
                </div>
                <div style="width: 45%;">
                    <input type="text" id="t2Name" class="name-input" placeholder="اسم الفريق 2" value="فريق 2">
                    <br>
                    <button class="btn" style="width:50px; font-size: 1.5rem;" id="p2Plus">+</button> 
                    <button class="btn" style="width:50px; background:var(--d); color:white;" id="p2Minus">-</button>
                </div>
            </div>
        </div>
        <button class="btn" style="background:#6c757d; color:white; margin-top:20px;" onclick="location.reload()">إعادة ضبط المسابقة</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpYA8LMYe-8EnUCB5_p1zYPicK2jfBuuk",
            authDomain: "sarzix-dots.firebaseapp.com",
            databaseURL: "https://sarzix-dots-default-rtdb.firebaseio.com",
            projectId: "sarzix-dots",
            storageBucket: "sarzix-dots.firebasestorage.app",
            messagingSenderId: "955409618557",
            appId: "1:955409618557:web:a6603680639d1cdff48314",
            measurementId: "G-QF9EJ1RQ2K"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const quizRef = ref(db, 'mstf_live_quiz');

        const quizData = [
            { img: "https://j.top4top.io/p_3724dpbqn0.png", ans: "سمكري" }, { img: "https://k.top4top.io/p_3724jdw4d1.png", ans: "حلزون" },
            { img: "https://l.top4top.io/p_3724luagk2.png", ans: "ارجنتين" }, { img: "https://a.top4top.io/p_3724ohvq03.png", ans: "شرطي" },
            { img: "https://c.top4top.io/p_3724sp59t5.png", ans: "سلاحف النينجا" }, { img: "https://l.top4top.io/p_3724uig9h8.png", ans: "خوسانوف" },
            { img: "https://k.top4top.io/p_372471ld67.png", ans: "رأس تنورة" }, { img: "https://j.top4top.io/p_3724ye0666.png", ans: "بارنيز" },
            { img: "https://i.top4top.io/p_37249olqk5.png", ans: "ابن تيمية" }, { img: "https://h.top4top.io/p_3724kdth24.png", ans: "عمر ابن الخطاب" },
            { img: "https://g.top4top.io/p_3724d3fs63.png", ans: "بوشروان" }, { img: "https://f.top4top.io/p_3724mi6r22.png", ans: "سمبدوريا" },
            { img: "https://e.top4top.io/p_3724klyfy1.png", ans: "ريال مدريد" }, { img: "https://g.top4top.io/p_37241orcq0.png", ans: "ديبروين" },
            { img: "https://a.top4top.io/p_3724y6b4z0.png", ans: "سلمون" }, { img: "https://g.top4top.io/p_3724vps3t0.png", ans: "أنشيلوتي" },
            { img: "https://h.top4top.io/p_3724blapi1.png", ans: "كيلوباترا" }, { img: "https://i.top4top.io/p_3724h40s32.png", ans: "نايكي" },
            { img: "https://j.top4top.io/p_3724ochzp3.png", ans: "ون بيس" }, { img: "https://k.top4top.io/p_3724pc0v04.png", ans: "محمد نور" },
            { img: "https://l.top4top.io/p_3724iknjf5.png", ans: "فيران توريس" }, { img: "https://a.top4top.io/p_3724qtv4t6.png", ans: "قرنفل" },
            { img: "https://i.top4top.io/p_3724iaz561.png", ans: "حجاب" }, { img: "https://h.top4top.io/p_3724otr080.png", ans: "خوباستي" },
            { img: "https://g.top4top.io/p_3724abzp10.jpg", ans: "كتكوت" }, { img: "https://h.top4top.io/p_3724542d81.jpg", ans: "نيوم" },
            { img: "https://i.top4top.io/p_3724668xo2.jpg", ans: "روسيا" }, { img: "https://j.top4top.io/p_3724horph3.jpg", ans: "برجوين" },
            { img: "https://f.top4top.io/p_3724junfe0.png", ans: "بطانية" }, { img: "https://e.top4top.io/p_3724k4z4q1.png", ans: "ابل باي" },
            { img: "https://f.top4top.io/p_3724ajxfb2.png", ans: "بور روب" }, { img: "https://g.top4top.io/p_37241ny3x3.png", ans: "توتنهام" },
            { img: "https://h.top4top.io/p_3724jskop4.png", ans: "كوكوريا" }, { img: "https://i.top4top.io/p_3724recs95.png", ans: "توتي" },
            { img: "https://j.top4top.io/p_3724pwxa16.png", ans: "متجر" }, { img: "https://k.top4top.io/p_37244tplt7.png", ans: "جيجي بوفون" },
            { img: "https://l.top4top.io/p_3724x9lf18.png", ans: "أليسون" }, { img: "https://i.top4top.io/p_37243sf7m0.png", ans: "دومينوز" },
            { img: "https://j.top4top.io/p_37247ytwt1.png", ans: "بوربوينت" }, { img: "https://k.top4top.io/p_3724mej1x2.png", ans: "كرتون" },
            { img: "https://l.top4top.io/p_3724apxgp3.png", ans: "بيج بيك" }, { img: "https://a.top4top.io/p_37242cqd54.png", ans: "بوكس فايت" },
            { img: "https://c.top4top.io/p_3724gldev6.png", ans: "مكتبة السعادة" }, { img: "https://e.top4top.io/p_37240ju7y8.png", ans: "فري فاير" },
            { img: "https://f.top4top.io/p_37245sfun9.png", ans: "اوفر تايم" }
        ];

        let curIdx = 0, p1 = 0, p2 = 0;

        window.initApp = function(mode) {
            document.getElementById('s-home').style.display = 'none';
            if(mode === 'display') {
                document.getElementById('s-display').classList.add('active');
                onValue(quizRef, (snap) => {
                    const data = snap.val();
                    if(data) {
                        document.getElementById('d-img').src = data.img;
                        document.getElementById('d-p1').innerText = data.p1;
                        document.getElementById('d-p2').innerText = data.p2;
                        document.getElementById('d-t1n').innerText = data.t1n || "فريق 1";
                        document.getElementById('d-t2n').innerText = data.t2n || "فريق 2";
                        document.getElementById('d-num').innerText = "اللغز رقم " + (data.idx + 1);
                        document.getElementById('d-ans').innerText = data.ans;
                        document.getElementById('d-ans').style.display = data.reveal ? 'block' : 'none';
                    }
                });
            } else {
                document.getElementById('s-admin').classList.add('active');
                sync(true);
            }
        };

        function sync(resetReveal = false) {
            update(quizRef, {
                img: quizData[curIdx].img,
                ans: quizData[curIdx].ans,
                p1: p1, p2: p2, idx: curIdx,
                t1n: document.getElementById('t1Name').value,
                t2n: document.getElementById('t2Name').value,
                reveal: resetReveal ? false : undefined
            });
            document.getElementById('a-hint').innerText = "الإجابة: " + quizData[curIdx].ans;
        }

        document.getElementById('t1Name').oninput = () => sync();
        document.getElementById('t2Name').oninput = () => sync();
        document.getElementById('btnReveal').onclick = () => update(quizRef, { reveal: true });
        document.getElementById('btnNext').onclick = () => { if(curIdx < quizData.length-1) { curIdx++; sync(true); } };
        document.getElementById('p1Plus').onclick = () => { p1++; sync(); };
        document.getElementById('p1Minus').onclick = () => { if(p1>0) p1--; sync(); };
        document.getElementById('p2Plus').onclick = () => { p2++; sync(); };
        document.getElementById('p2Minus').onclick = () => { if(p2>0) p2--; sync(); };
    </script>
</body>
</html>
